<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager - Java Swing App</title>
    <link rel="icon" href="data:,">
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #app-container {
            width: 100vw;
            height: 100svh;
        }
    </style>
</head>
<body>
    <div id="app-container"></div>
    <script type="module">
        const container = document.getElementById("app-container");

        async function downloadCheerpJFile(path, fileName) {
            const blob = await cjFileBlob(path);
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = fileName || "event.json";
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        try {
            console.log("Starting CheerpJ initialization...");
            await cheerpjInit({
                version: 17,
                javaProperties: ["eventmanager.browser=true"],
                execCallback(cmdPath, argsArray) {
                    if (cmdPath === "eventmanager-download" || cmdPath.endsWith("/eventmanager-download")) {
                        downloadCheerpJFile(argsArray[0], argsArray[1])
                            .catch(error => console.error("Download error:", error));
                    }
                }
            });

            cheerpjCreateDisplay(-1, -1, container);
            await cheerpjRunJar("/app/DCI.jar");
        } catch (error) {
            console.error("CheerpJ startup error:", error);
            container.textContent = "Error loading Event Manager: " + error;
        }
    </script>
</body>
</html>
